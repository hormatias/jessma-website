about:
  title: About Me
  image_alt: Jessica - Event decor specialist
  paragraphs:
    - Hello! I'm Jessica. I love creating decorations that genuinely move people. With a background in public relations, event organisation and visual merchandising, I combine creativity and technique to bring your ideas to life.
    - I enjoy every project and take care over every detail, turning an idea into an unforgettable setting. My aim is to make your event feel magical and truly special.
