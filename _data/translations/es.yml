about:
  title: Conóceme
  image_alt: Jessica - Decoración de eventos
  paragraphs:
    - ¡Hola! Soy Jessica. Me apasiona emocionar a las personas a través de mis decoraciones. Con mi formación en Relaciones Públicas, Organización de Eventos y Escaparatismo, uno creatividad y técnica para dar vida a tus ideas.
    - Disfruto cada proyecto, cuidando cada detalle para transformar un concepto en una decoración inolvidable. Mi objetivo es convertir tu evento en un momento mágico y especial.
