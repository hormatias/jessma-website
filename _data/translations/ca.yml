about:
  title: Coneix-me
  image_alt: Jessica - Decoració d'esdeveniments
  paragraphs:
    - Hola! Sóc la Jessica. M'apassiona emocionar les persones a través de les meves decoracions. Amb la meva formació en Relacions Públiques, Organització d'Esdeveniments i Escaparatisme, uneixo creativitat i tècnica per donar vida a les teves idees.
    - Gaudeixo de cada projecte, cuidant cada detall per transformar un concepte en una decoració inoblidable. El meu objectiu és convertir el teu esdeveniment en un moment màgic i especial.
